<body class="flex justify-center" style="background-color: #1f2937;">
  
  <div id="app" v-cloak class="w-full max-w-md min-h-screen flex flex-col items-center relative overflow-y-auto no-scrollbar shadow-2xl transition-all duration-500">
    <transition name="fade">
      <div v-show="!isAutoShare" class="w-full flex flex-col items-center pb-16 relative min-h-full">
        
        <div v-if="profile['背景圖片URL']" class="relative w-full aspect-[4/5] shrink-0 bg-cover bg-center flex flex-col justify-end items-center" :style="{ backgroundImage: 'url(' + profile['背景圖片URL'] + ')' }">
            <div class="absolute bottom-0 left-0 w-full h-[50%]" :style="{ backgroundImage: 'linear-gradient(to top, ' + safeBgColor + ' 0%, transparent 100%)' }"></div>
        </div>
        <div v-else class="relative w-full h-[150px] shrink-0"></div>

        <div class="relative z-10 -mt-[60px] mb-4 flex justify-center w-full">
            <!-- ⚡️ 防護 1：大頭貼如果載入失敗，自動換成預設圖 -->
            <img :src="profile['大頭貼圖片URL'] || 'https://via.placeholder.com/150'" @error="$event.target.src='https://via.placeholder.com/150?text=Avatar'" class="w-[100px] h-[100px] rounded-full object-cover shadow-sm border-[4px]" :style="{ borderColor: safeBgColor }">
        </div>

        <div class="relative z-10 w-full flex flex-col items-center px-8">
            <h1 class="font-black text-center mb-5 tracking-[0.15em]" :style="{ color: profile['全域文字顏色'] || '#1a1a1a', fontSize: '27px', fontFamily: getFontFamily(profile['主標題字體'] || profile.titleFont) }">{{ profile['顯示名稱'] }}</h1>
            <p class="text-center whitespace-pre-wrap leading-[2.5] tracking-widest w-full break-words opacity-90 mb-8 font-medium" :style="{ color: profile['全域文字顏色'] || '#1a1a1a', fontSize: '16px', fontFamily: getFontFamily(profile['敘述文字體'] || profile.bioFont) }">{{ profile['個人簡介文字'] }}</p>
            
            <div v-if="hasSocialLinks" class="flex flex-wrap gap-4 mt-5 mb-8 justify-center items-center">
                <a v-if="profile['FB連結'] || profile.fbUrl" :href="profile['FB連結'] || profile.fbUrl" target="_blank" class="hover:opacity-70 transition flex items-center justify-center" :style="{ color: profile['社群Icon顏色'] || profile.socialIconColor || '#000000' }"><i class="ph-fill ph-facebook-logo" style="font-size: 37px;"></i></a>
                <a v-if="profile['IG連結'] || profile.igUrl" :href="profile['IG連結'] || profile.igUrl" target="_blank" class="hover:opacity-70 transition flex items-center justify-center" :style="{ color: profile['社群Icon顏色'] || profile.socialIconColor || '#000000' }"><i class="ph-fill ph-instagram-logo" style="font-size: 37px;"></i></a>
                <a v-if="profile['Threads連結'] || profile.threadsUrl" :href="profile['Threads連結'] || profile.threadsUrl" target="_blank" class="hover:opacity-70 transition flex items-center justify-center" :style="{ color: profile['社群Icon顏色'] || profile.socialIconColor || '#000000' }"><i class="ph-fill ph-threads-logo" style="font-size: 37px;"></i></a>
                <a v-if="profile['TikTok連結'] || profile.tiktokUrl" :href="profile['TikTok連結'] || profile.tiktokUrl" target="_blank" class="hover:opacity-70 transition flex items-center justify-center" :style="{ color: profile['社群Icon顏色'] || profile.socialIconColor || '#000000' }"><i class="ph-fill ph-tiktok-logo" style="font-size: 37px;"></i></a>
                <a v-if="profile['YouTube頻道連結（給社群 Icon 專用，以免跟原本的影音嵌入衝突）'] || profile.ytChannelUrl" :href="profile['YouTube頻道連結（給社群 Icon 專用，以免跟原本的影音嵌入衝突）'] || profile.ytChannelUrl" target="_blank" class="hover:opacity-70 transition flex items-center justify-center" :style="{ color: profile['社群Icon顏色'] || profile.socialIconColor || '#000000' }"><i class="ph-fill ph-youtube-logo" style="font-size: 37px;"></i></a>
                <a v-if="profile['WhatsApp連結'] || profile.whatsappUrl" :href="profile['WhatsApp連結'] || profile.whatsappUrl" target="_blank" class="hover:opacity-70 transition flex items-center justify-center" :style="{ color: profile['社群Icon顏色'] || profile.socialIconColor || '#000000' }"><i class="ph-fill ph-whatsapp-logo" style="font-size: 37px;"></i></a>
                <a v-if="profile['LinkedIn連結'] || profile.linkedinUrl" :href="profile['LinkedIn連結'] || profile.linkedinUrl" target="_blank" class="hover:opacity-70 transition flex items-center justify-center" :style="{ color: profile['社群Icon顏色'] || profile.socialIconColor || '#000000' }"><i class="ph-fill ph-linkedin-logo" style="font-size: 37px;"></i></a>
                <a v-if="profile['Podcast連結'] || profile.podcastUrl" :href="profile['Podcast連結'] || profile.podcastUrl" target="_blank" class="hover:opacity-70 transition flex items-center justify-center" :style="{ color: profile['社群Icon顏色'] || profile.socialIconColor || '#000000' }"><i class="ph-fill ph-microphone-stage" style="font-size: 37px;"></i></a>
            </div>

                <iframe v-if="getVideoData(profile['YouTube影音連結']).type !== 'html5'" :src="getVideoData(profile['YouTube影音連結']).embedUrl" class="absolute inset-0 w-full h-full" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                <video v-if="getVideoData(profile['YouTube影音連結']).type === 'html5'" :src="getVideoData(profile['YouTube影音連結']).embedUrl" class="absolute inset-0 w-full h-full" controls playsinline controlslist="nodownload"></video>
            </div>
            
            <div class="w-full space-y-4 pb-6">
              <template v-for="(btn, index) in buttons" :key="index">
                <a v-if="btn['按鈕類型'] !== 'image'" :href="buildFinalLink(btn.type || 'url', btn['跳轉連結'] || btn.url)" target="_blank" @click="trackClickAsync(btn, index)" class="w-full flex items-center justify-center font-bold px-4 py-[16px] transition cursor-pointer relative overflow-hidden group shadow-sm transform hover:opacity-90" :style="{ backgroundColor: btn['按鈕背景顏色'] || '#D2B992', color: btn['按鈕文字顏色'] || '#000000', borderRadius: '13px', textDecoration: 'none', fontFamily: getFontFamily(btn['按鈕字體'] || btn.font) }">

                  <span class="tracking-[0.1em]" style="font-size: 17px;">{{ btn['按鈕文字'] || btn.title }}</span>
                </a>
                
                <div v-else class="w-full aspect-[4/5] relative rounded-[13px] overflow-hidden shadow-sm group transform transition hover:opacity-[0.98] select-none touch-pan-y" 
                     @touchstart="handleTouchStart($event)" 
                     @touchend="handleTouchEnd($event, btn)">
                  <a :href="buildFinalLink(btn.images[btn.currentImgIdx || 0]?.linkType || btn.type || 'url', btn.images[btn.currentImgIdx || 0]?.linkValue || btn['跳轉連結'] || btn.url)" target="_blank" @click="trackClickAsync(btn, index)" class="block w-full h-full relative cursor-pointer bg-gray-100">
                    <transition-group name="fade">
                      <!-- ⚡️ 防護 2：按鈕圖片如果載入失敗，自動換成預設圖 -->
                      <img v-for="(imgObj, i) in btn.images" :key="imgObj.url + i" v-show="(btn.currentImgIdx || 0) === i" :src="imgObj.url" @error="$event.target.src='https://via.placeholder.com/600x750?text=Image+Error'" class="absolute inset-0 w-full h-full object-cover">
                    </transition-group>
                  </a>
                  <div v-if="btn.images && btn.images.length > 1" class="absolute bottom-4 left-0 right-0 flex justify-center gap-2 z-20 pointer-events-none">
                    <div v-for="(imgObj, i) in btn.images" :key="'dot'+i" class="w-2 h-2 rounded-full transition-all duration-300 shadow-sm" :class="(btn.currentImgIdx || 0) === i ? 'bg-white scale-110' : 'bg-white/50'"></div>
                  </div>
                  <button v-if="btn.images && btn.images.length > 1" @click.stop.prevent="prevImg(btn)" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/20 text-white rounded-full w-8 h-8 flex items-center justify-center z-20 hover:bg-black/50 transition opacity-0 lg:group-hover:opacity-100"><i class="ph-bold ph-caret-left text-lg"></i></button>
                  <button v-if="btn.images && btn.images.length > 1" @click.stop.prevent="nextImg(btn)" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/20 text-white rounded-full w-8 h-8 flex items-center justify-center z-20 hover:bg-black/50 transition opacity-0 lg:group-hover:opacity-100"><i class="ph-bold ph-caret-right text-lg"></i></button>
                </div>
              </template>
            </div>

            <div v-if="slides && slides.length > 0" class="w-full mt-4 pb-10">
                <div class="flex items-center gap-3 mb-5 px-2">
                    <div class="h-[1px] flex-1 bg-black/10" :style="{ backgroundColor: profile['全域文字顏色'] || '#1a1a1a', opacity: 0.15 }"></div>
                    <span class="font-black tracking-widest text-xs uppercase" :style="{ color: profile['全域文字顏色'] || '#1a1a1a', opacity: 0.6 }">Highlights</span>
                    <div class="h-[1px] flex-1 bg-black/10" :style="{ backgroundColor: profile['全域文字顏色'] || '#1a1a1a', opacity: 0.15 }"></div>
                </div>
                <div class="flex gap-4 overflow-x-auto no-scrollbar px-2 pb-6 snap-x snap-mandatory items-stretch">
                    <div v-for="slide in slides" :key="slide.id" class="snap-center shrink-0 w-[245px] rounded-[24px] overflow-hidden shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-white/20 flex flex-col relative transform transition hover:-translate-y-1" :style="{ backgroundColor: slide.bgColor || '#ffffff' }">
                        <div class="w-full aspect-[1080/1680] relative overflow-hidden bg-gray-100 border-b border-gray-100/50">
                            <!-- ⚡️ 防護 3：輪播圖片如果載入失敗，自動換成預設圖 -->
                            <img v-if="slide.imageUrl" :src="slide.imageUrl" @error="$event.target.src='https://via.placeholder.com/1080x1680?text=Slide+Error'" class="absolute inset-0 w-full h-full object-cover">
                            <div v-else class="absolute inset-0 flex items-center justify-center text-gray-300 bg-gray-50"><i class="ph-fill ph-image text-4xl"></i></div>
                        </div>
                        <div v-if="slide.buttons && slide.buttons.length > 0" class="pt-[13px] pb-[12px] px-[8px] flex flex-col gap-[10px] w-full relative z-10 flex-1 justify-end">
                            <a v-for="(sBtn, bIdx) in slide.buttons" :key="bIdx" :href="buildFinalLink(sBtn.type, sBtn.linkValue)" target="_blank" @click="trackClickAsync({ '跳轉連結': sBtn.linkValue, '按鈕ID': slide.id, '按鈕文字': sBtn.title }, bIdx, 'slide')" class="w-full text-center py-[10px] rounded-lg text-[14px] font-bold shadow-sm hover:scale-[1.02] active:scale-[0.98] transition-transform duration-200" :style="{ backgroundColor: sBtn.color || '#6C0B22', color: slide.buttonTextColor || '#ffffff', fontFamily: getFontFamily(slide.buttonFont) }">
                                {{ sBtn.title || '按鈕文字' }}
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            
            <p class="mt-4 pb-12 font-medium tracking-wider text-gray-400 opacity-60" style="font-size: 14px;">
              <a href="https://lin.ee/WKcncUr" target="_blank" class="hover:opacity-100 hover:text-gray-600 transition-all duration-300">
                Powered by Ruby.Brand.Design
              </a>
            </p>
        </div>
      </div>
    </transition>
  </div>

    if (isAutoShare) {
        let preloadedFlexMsg = decodeBase64Safe(RAW_FLEX_MSG_DATA);
        
        liff.init({ liffId: LIFF_ID }).then(() => {
            if (!liff.isLoggedIn()) {
                liff.login({ redirectUri: window.location.href });
                return;
            }
            if (preloadedFlexMsg && preloadedFlexMsg.type === 'carousel') {
                liff.shareTargetPicker([{
                    type: "flex", 
                    altText: "特洛伊AI賦能師 的專屬電子名片", 
                    contents: preloadedFlexMsg
                }]).then(() => {
                    liff.closeWindow();
                }).catch(() => {
                    liff.closeWindow();
                });
            } else {
                liff.closeWindow();
            }
        }).catch(() => liff.closeWindow());

    } else {
        const { createApp, ref, computed, onMounted } = Vue;
        
        createApp({
          setup() {
            let pData = decodeBase64Safe(RAW_PROFILE_DATA) || {};
            let bData = decodeBase64Safe(RAW_BUTTONS_DATA) || [];
            let sData = decodeBase64Safe(RAW_SLIDES_DATA) || [];

            const profile = ref(pData);
            const safeBgColor = ref("#1f2937");
            
            const hasSocialLinks = computed(() => {
               const p = profile.value;
               return p['FB連結'] || p.fbUrl || p['IG連結'] || p.igUrl || p['TikTok連結'] || p.tiktokUrl || p['Threads連結'] || p.threadsUrl || p['WhatsApp連結'] || p.whatsappUrl || p['LinkedIn連結'] || p.linkedinUrl || p['Podcast連結'] || p.podcastUrl || p['YouTube頻道連結（給社群 Icon 專用，以免跟原本的影音嵌入衝突）'] || p.ytChannelUrl;
            });

            const buttons = ref(bData.map(b => {
                let parsedImages = [];
                if (b['圖片詳細設定']) { try { parsedImages = JSON.parse(b['圖片詳細設定']); } catch(e) {} }
                if (parsedImages.length === 0 && b['圖片清單']) {
                    parsedImages = b['圖片清單'].split(',').map(url => ({ url: url.trim(), linkType: 'url', linkValue: '' })).filter(img => img.url !== '');
                }
                return { ...b, currentImgIdx: 0, images: parsedImages };
            }));

            const slides = ref(sData.map(s => {
              const slideBtns = (s.buttons || []).map(b => ({ title: b.text || b.title || '', linkValue: b.url || b.linkValue || '', type: b.type || 'url', color: b.color || '#6C0B22' }));
              return { id: s.id || s['輪播ID'], imageUrl: s.imageUrl || s['主圖片URL'], bgColor: s.bgColor || '#ffffff', buttonTextColor: s.buttonTextColor || '#ffffff', buttonFont: s.buttonFont || '預設字體', buttons: slideBtns };
            }));
            
            const touchStartX = ref(0);
            const handleTouchStart = (e) => { touchStartX.value = e.changedTouches[0].screenX; };
            
            const nextImg = (btn) => {
                if (btn.images && btn.images.length > 1) {
                    btn.currentImgIdx = ((btn.currentImgIdx || 0) + 1) % btn.images.length;
                }
            };
            const prevImg = (btn) => {
                if (btn.images && btn.images.length > 1) {
                    btn.currentImgIdx = ((btn.currentImgIdx || 0) - 1 + btn.images.length) % btn.images.length;
                }
            };

            const handleTouchEnd = (e, btn) => {
                if (!btn.images || btn.images.length <= 1) return;
                const diff = touchStartX.value - e.changedTouches[0].screenX;
                if (diff > 40) { nextImg(btn); } 
                else if (diff < -40) { prevImg(btn); }
            };

            const getVideoData = (url) => {
                if (!url) return null;
                const ytMatch = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
                if (ytMatch && ytMatch[2].length === 11) return { type: "youtube", embedUrl: "https://www.youtube.com/embed/" + ytMatch[2] };
                const vimeoMatch = url.match(/(?:vimeo\.com\/|player\.vimeo\.com\/video\/)([0-9]+)/);
                if (vimeoMatch && vimeoMatch[1]) return { type: "vimeo", embedUrl: "https://player.vimeo.com/video/" + vimeoMatch[1] + "?title=0&byline=0&portrait=0" };
                const driveMatch = url.match(/drive\.google\.com\/(?:file\/d\/|open\?id=)([a-zA-Z0-9_-]+)/);
                if (driveMatch && driveMatch[1]) return { type: "html5", embedUrl: "https://drive.google.com/uc?export=download&id=" + driveMatch[1] };
                if (url.match(/\.(mp4|webm|ogg)$/i)) return { type: "html5", embedUrl: url };
                return null;
            };

            const getFontFamily = (fontName) => {
                const map = { "預設字體": "sans-serif", "黑體": "\"Noto Sans TC\", sans-serif", "明體": "\"Noto Serif TC\", serif", "圓體": "\"Zen Maru Gothic\", sans-serif" };
                return map[fontName] || "sans-serif";
            };

            const buildFinalLink = (type, value) => {
                if (!value) return "#";
                if (type === "tel") return value.startsWith("tel:") ? value : "tel:" + value;
                if (type === "email") return value.startsWith("mailto:") ? value : "mailto:" + value;
                if (type === "share" || String(value).includes("social-plugins.line.me") || String(value).includes("line.me/R/msg") || String(value).includes("liff.line.me")) {
                    if (String(value).includes("liff.line.me")) return value;
                    let shareText = "";
                    if (String(value).includes("text=")) shareText = decodeURIComponent(value.split("text=")[1]);
                    else {
                        let customPath = profile.value['個人頁個性化網址'] || profile.value['會員ID'];
                        shareText = "哈囉！這是「" + (profile.value['顯示名稱'] || "我") + "」的電子名片，請點擊連結查看：\nhttps://rubybranddesign-cloud.github.io/e-line-card-share/" + customPath + "/";
                    }
                    return "https://social-plugins.line.me/lineit/share?text=" + encodeURIComponent(shareText);
                }
                if (type === "line" || type === "line_personal") {
                    if (value.startsWith("http")) return value;
                    return "https://line.me/ti/p/~" + value.replace("@", "%40");
                }
                if (!value.startsWith("http") && !value.startsWith("mailto:") && !value.startsWith("tel:")) return "https://" + value;
                return value;
            };

            const trackClickAsync = (btn, index, specificType) => {
                let targetUrl = btn['跳轉連結'] || btn.url || btn.linkValue;
                if (btn['按鈕類型'] === 'image' || btn.btnType === 'image') {
                    if (btn.images && btn.images[btn.currentImgIdx || 0]) targetUrl = btn.images[btn.currentImgIdx || 0].linkValue || targetUrl;
                }
                const itemId = btn['按鈕ID'] || btn.id || "未知ID";
                const btnText = btn['按鈕文字'] || btn.title || "未知按鈕";
                const memberId = profile.value['會員ID'];
                if (!memberId || !targetUrl) return;
                const reqType = specificType || "button";
                const trackUrl = GAS_API_URL + "?action=trackClick&memberId=" + memberId + "&type=" + reqType + "&itemId=" + itemId + "&btnIdx=" + (index + 1) + "&btnText=" + encodeURIComponent(btnText) + "&url=" + encodeURIComponent(targetUrl);
                fetch(trackUrl, { mode: "no-cors" }).catch(e => console.log(e));
            };

            onMounted(() => { liff.init({ liffId: LIFF_ID }).catch(()=>{}); });

            return { profile, buttons, slides, safeBgColor, hasSocialLinks, trackClickAsync, getVideoData, buildFinalLink, getFontFamily, handleTouchStart, handleTouchEnd, nextImg, prevImg, isAutoShare };
          }
        }).mount("#app");
    }
