<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RubyBrandDesign | 專屬電子名片</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f9fafb; -webkit-tap-highlight-color: transparent; }
    .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.6); }
    .fade-enter-active, .fade-leave-active { transition: opacity 0.5s ease; }
    .fade-enter-from, .fade-leave-to { opacity: 0; }
  </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col items-center justify-center p-4">

  <div id="app" class="w-full max-w-sm w-full relative">
    
    <transition name="fade">
        <div v-if="isLoading" class="absolute inset-0 z-50 flex flex-col items-center justify-center pt-20">
            <div class="w-16 h-16 border-4 border-pink-200 border-t-pink-500 rounded-full animate-spin mb-4"></div>
            <p class="font-bold text-gray-500 animate-pulse">{{ loadingMsg }}</p>
        </div>
    </transition>

    <div v-if="errorMsg" class="bg-white p-8 rounded-3xl shadow-xl text-center mt-10">
        <i class="ph-fill ph-warning-circle text-5xl text-red-500 mb-4"></i>
        <h2 class="text-xl font-black text-gray-900 mb-2">名片讀取失敗</h2>
        <p class="text-gray-500 text-sm">{{ errorMsg }}</p>
    </div>

    <transition name="fade">
        <div v-if="!isLoading && profile" class="bg-white rounded-[40px] shadow-2xl overflow-hidden flex flex-col" :style="{ backgroundColor: profile['背景顏色'] || '#ffffff' }">
            
            <div class="pt-12 px-6 pb-10 flex flex-col items-center">
                <div class="relative mb-4">
                    <img :src="profile['大頭貼圖片URL'] || 'https://via.placeholder.com/150'" class="w-28 h-28 rounded-full object-cover border-4 border-white shadow-lg bg-gray-100">
                </div>
                <div class="text-2xl font-black text-center mb-2 text-gray-900">{{ profile['顯示名稱'] }}</div>
                <div class="text-sm text-center text-gray-600 whitespace-pre-wrap leading-relaxed w-full break-words">{{ profile['自我介紹'] }}</div>

                <div class="w-full mt-8 space-y-3 pb-4">
                    <a v-for="(btn, index) in buttons" :key="index" 
                       :href="btn.url" target="_blank"
                       @click="trackClick(btn['按鈕ID'])"
                       class="w-full rounded-2xl shadow-sm flex items-center gap-3 px-3 py-3 border border-white/50 transition hover:scale-[1.02] active:scale-[0.98]" 
                       :style="{ backgroundColor: btn['按鈕顏色'] || '#ffffff' }">
                        <div class="w-12 h-12 rounded-xl bg-white/60 flex items-center justify-center overflow-hidden shrink-0 shadow-inner">
                            <img v-if="btn['圖標URL']" :src="btn['圖標URL']" class="w-full h-full object-cover">
                            <i v-else class="ph ph-link text-gray-800 text-xl"></i>
                        </div>
                        <div class="flex-1 font-bold text-gray-800 text-center pr-12 truncate">{{ btn['按鈕名稱'] }}</div>
                    </a>
                </div>
            </div>
            
        </div>
    </transition>

  </div>

  <script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
      setup() {
        const LIFF_ID = "2009561347-VUhbtrEC";
        // 請確保這裡填寫的是正確的 GAS 網址
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzvRtYWqMtRbl1p2qzvfnhz-es1X9TqvHHt2tqz4ZR2FDhstbmG8SjYEO8I-25JQal03g/exec';
        
        const isLoading = ref(true);
        const loadingMsg = ref('系統初始化中...');
        const errorMsg = ref('');
        const profile = ref(null);
        const buttons = ref([]);
        const flexMsg = ref(null);
        const currentMemberId = ref('');

        const initLiffAndFetchData = async () => {
            try {
                // 1. 初始化 LIFF
                loadingMsg.value = '連線至 LINE 服務...';
                await liff.init({ liffId: LIFF_ID });

                // 2. 抓取網址上的參數 (?id=xxx&autoShare=true)
                const urlParams = new URLSearchParams(window.location.search);
                const memberId = urlParams.get('id');
                const isAutoShare = urlParams.get('autoShare') === 'true';

                if (!memberId) {
                    throw new Error("網址缺少專屬名片 ID");
                }
                currentMemberId.value = memberId;

                // 3. 向 GAS 後端請求名片資料與 Flex Message JSON
                loadingMsg.value = '讀取專屬設計...';
                const response = await fetch(`${GAS_API_URL}?id=${memberId}`);
                const data = await response.json();

                if (data.status !== 'success') throw new Error(data.message || "資料讀取失敗");

                profile.value = data.profile;
                buttons.value = data.buttons;
                flexMsg.value = data.flexMsg;

                // 4. 處理「轉發好友」的核心邏輯
                if (isAutoShare) {
                    if (!liff.isLoggedIn()) {
                        liff.login({ redirectUri: window.location.href });
                        return;
                    }
                    if (liff.isApiAvailable('shareTargetPicker')) {
                        loadingMsg.value = '喚醒轉發功能中...';
                        await liff.shareTargetPicker([flexMsg.value]);
                        liff.closeWindow(); // 傳送完畢自動關閉視窗
                        return;
                    } else {
                        throw new Error("您的裝置環境不支援 LINE 轉發功能");
                    }
                }

                isLoading.value = false;

            } catch (err) {
                console.error(err);
                errorMsg.value = err.message;
                isLoading.value = false;
            }
        };

        // 點擊按鈕時，背景傳送數據給 GAS 紀錄點擊率 (不影響轉跳)
        const trackClick = (btnId) => {
            fetch(`${GAS_API_URL}?action=trackClick&memberId=${currentMemberId.value}&type=button&itemId=${btnId}&url=ignore`, { method: 'GET', mode: 'no-cors' });
        };

        onMounted(() => {
            initLiffAndFetchData();
        });

        return { isLoading, loadingMsg, errorMsg, profile, buttons, trackClick };
      }
    }).mount('#app');
  </script>
</body>
</html>
