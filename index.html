<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>RubyBrandDesign 電子名片</title>
  
  <meta property="og:title" content="RubyBrandDesign 專屬電子名片">
  <meta property="og:description" content="點擊連結，查看我的專屬電子名片與最新資訊！">
  <meta property="og:image" content="https://drive.google.com/thumbnail?id=1qS2jY3DkOoxbjd5hI6F7rl6pYbBRDbfs&sz=w1000">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #FDF2F8; }
    .glass-card { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.9); box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
    .fade-enter-active, .fade-leave-active { transition: opacity 0.3s ease-out, transform 0.3s ease-out; }
    .fade-enter-from, .fade-leave-to { opacity: 0; transform: translateY(15px); }
    [v-cloak] { display: none !important; }
  </style>
</head>
<body>
  <div id="app" v-cloak class="min-h-screen flex flex-col items-center justify-center py-6 px-4 transition-colors duration-500" :style="{ backgroundColor: profile.背景主題顏色 || '#FDF2F8' }">
    
    <div v-if="isLoading" class="flex flex-col items-center justify-center space-y-4">
      <div class="w-12 h-12 border-4 border-pink-200 border-t-pink-500 rounded-full animate-spin"></div>
      <p class="text-gray-500 font-bold tracking-widest text-sm">載入中...</p>
    </div>

    <div v-else-if="errorMessage" class="flex flex-col items-center justify-center bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full">
      <i class="ph-fill ph-warning-circle text-5xl text-red-500 mb-4"></i>
      <p class="text-gray-800 font-bold text-center whitespace-pre-wrap" v-text="errorMessage"></p>
    </div>

    <div v-else-if="isAutoShare" class="w-full flex flex-col items-center justify-center text-center">
      <div class="w-24 h-24 bg-white rounded-full shadow-xl flex items-center justify-center mb-6">
         <i class="ph-fill ph-paper-plane-tilt text-5xl text-[#06C755] animate-pulse"></i>
      </div>
      <h2 class="text-2xl font-black text-gray-900 mb-2">準備發送名片</h2>
      <p class="text-gray-500 font-bold mb-8">請在彈出的視窗中選擇發送對象</p>
    </div>

    <transition name="fade">
      <div v-if="!isLoading && !errorMessage && !isAutoShare" class="w-full max-w-md glass-card rounded-[2rem] p-8 flex flex-col items-center relative overflow-hidden">
        
        <div class="w-32 h-32 rounded-full border-4 border-white shadow-xl overflow-hidden mb-6 bg-gray-100 shrink-0">
          <img v-if="profile.大頭貼圖片URL" :src="profile.大頭貼圖片URL" class="w-full h-full object-cover">
        </div>
        
        <h1 class="text-3xl font-black text-gray-900 mb-3" v-text="profile.顯示名稱"></h1>
        <p class="text-base text-gray-600 text-center whitespace-pre-wrap leading-relaxed mb-8 w-full font-medium" v-text="profile.個人簡介文字"></p>

        <button @click="shareMyCard" class="w-full bg-[#06C755] hover:bg-[#05b34c] text-white font-black text-lg py-4 rounded-2xl mb-8 shadow-lg transition-all flex items-center justify-center gap-2 transform active:scale-95">
          <i class="ph-fill ph-chat-circle-text text-2xl"></i> 傳送專屬名片
        </button>

        <div class="w-full space-y-4">
          <a v-for="(btn, index) in buttons" :key="index" :href="buildTrackedUrl(btn, index)" target="_blank" 
             class="w-full flex items-center gap-4 p-3 rounded-2xl border border-white/60 shadow-sm transition-all transform hover:-translate-y-1 hover:shadow-lg active:scale-95"
             :style="{ backgroundColor: btn.按鈕顏色 || '#ffffff' }">
            <div class="w-12 h-12 rounded-xl bg-white/80 flex items-center justify-center overflow-hidden shrink-0 shadow-inner">
              <img v-if="btn.Icon圖片URL" :src="btn.Icon圖片URL" class="w-full h-full object-cover">
              <i v-else class="ph ph-link text-xl text-gray-700"></i>
            </div>
            <div class="flex-1 font-black text-gray-800 text-lg pr-4" v-text="btn.按鈕文字"></div>
            <i class="ph-bold ph-caret-right text-gray-400 pr-2"></i>
          </a>
        </div>
      </div>
    </transition>
    
    <p v-if="!isLoading && !errorMessage && !isAutoShare" class="mt-8 text-xs font-bold text-gray-400 tracking-wider pb-4">POWERED BY RUBY.BRAND.DESIGN</p>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue;
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzbFDXSm7hjVf7eBHo9fcnWQvfRWio8L8l4bysiT47cGOsIr-CBQjUms2QqNNWEsTPsOw/exec";
    const LIFF_ID = "2009561347-VUhbtrEC";

    createApp({
      setup() {
        const profile = ref({});
        const buttons = ref([]);
        const flexMsg = ref(null);
        const isLoading = ref(true);
        const errorMessage = ref('');
        const isAutoShare = ref(false); 
        const memberIdRef = ref('');
        
        // 深度解析 LINE URL 參數
        const getMemberIdFromUrl = () => {
          let params = new URLSearchParams(window.location.search);
          if (params.has('liff.state')) {
            const stateStr = params.get('liff.state');
            const stateParams = new URLSearchParams(stateStr.startsWith('?') ? stateStr : '?' + stateStr);
            for (let [key, val] of stateParams.entries()) params.set(key, val);
          }
          isAutoShare.value = params.get('autoShare') === 'true';
          return params.get('id');
        };

        const closeLiff = () => {
            if (typeof liff !== 'undefined' && liff.isInClient()) { liff.closeWindow(); } 
            else { window.close(); }
        };

        const buildTrackedUrl = (btn, index) => {
            const targetUrl = btn['跳轉連結'] || btn.url;
            const itemId = btn[Object.keys(btn)[0]]; 
            if (!memberIdRef.value || !targetUrl) return targetUrl || '#';
            if (targetUrl.startsWith('tel:') || targetUrl.startsWith('mailto:') || targetUrl.includes('liff.line.me')) return targetUrl;
            return `${GAS_API_URL}?action=trackClick&memberId=${memberIdRef.value}&type=button&itemId=${itemId}&btnIdx=${index + 1}&url=${encodeURIComponent(targetUrl)}`;
        };

        const shareMyCard = async () => {
          try {
            if (typeof liff !== 'undefined' && liff.isInClient()) {
                if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }
                if (!flexMsg.value) { alert("名片建立中，請稍候。"); if(isAutoShare.value) closeLiff(); return; }

                if (liff.isApiAvailable('shareTargetPicker')) {
                  // 零延遲呼叫 LINE 原生介面
                  const res = await liff.shareTargetPicker([{
                    "type": "flex",
                    "altText": `這是 ${profile.value.顯示名稱 || '我'} 的電子名片，請查收！`, 
                    "contents": flexMsg.value
                  }]);
                  if (isAutoShare.value) closeLiff(); // 發送完畢秒關
                  else if (res) alert("✨ 名片已成功發送！");
                }
            } else {
                // 電腦版回退機制
                const shareUrl = `https://liff.line.me/${LIFF_ID}?id=${memberIdRef.value}`;
                const shareText = `哈囉！這是 ${profile.value.顯示名稱 || '我'} 的電子名片：\n${shareUrl}`;
                try { await navigator.clipboard.writeText(shareText); } catch(err) {}
                window.open(`https://line.me/R/msg/text/?${encodeURIComponent(shareText)}`, '_blank');
                if (isAutoShare.value) closeLiff();
            }
          } catch (err) {
            console.error(err);
            if (isAutoShare.value) closeLiff();
          }
        };

        onMounted(async () => {
          const memberId = getMemberIdFromUrl();
          memberIdRef.value = memberId;

          if (!memberId) {
            errorMessage.value = '網址參數錯誤\n請確認連結是否包含專屬 ID';
            isLoading.value = false;
            return;
          }

          // 🔥 雙管齊下：同時請求 API 與初始化 LIFF (不再互相等待)
          const apiRequest = fetch(`${GAS_API_URL}?id=${memberId}`).then(res => res.json());
          const liffRequest = liff.init({ liffId: LIFF_ID }).catch(e => console.warn(e));

          try {
            const data = await apiRequest; // 等待資料回來
            
            if (data.status === 'success') {
              profile.value = data.profile;
              buttons.value = data.buttons;
              flexMsg.value = data.flexMsg; // 後端算好的 JSON 直接塞入
              document.title = `${data.profile.顯示名稱} 的電子名片`;
              
              isLoading.value = false; // 立刻解鎖畫面

              if (isAutoShare.value) {
                  await liffRequest; // 確保 LIFF OK
                  shareMyCard();     // 🚀 零延遲瞬間觸發發送！
              }
            } else {
              errorMessage.value = data.message || '無法載入名片資料';
              isLoading.value = false;
            }
          } catch (error) {
            errorMessage.value = '網路連線異常，請重新整理。';
            isLoading.value = false;
          }
        });

        return { profile, buttons, isLoading, errorMessage, isAutoShare, shareMyCard, closeLiff, buildTrackedUrl };
      }
    }).mount('#app');
  </script>
</body>
</html>
