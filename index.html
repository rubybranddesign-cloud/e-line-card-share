<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>RubyBrandDesign 電子名片</title>
  
  <meta property="og:title" content="RubyBrandDesign 專屬電子名片">
  <meta property="og:description" content="點擊連結，查看我的專屬電子名片與最新資訊！">
  <meta property="og:url" content="https://liff.line.me/2009561347-VUhbtrEC">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://drive.google.com/thumbnail?id=1qS2jY3DkOoxbjd5hI6F7rl6pYbBRDbfs&sz=w1000">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    .fade-enter-active, .fade-leave-active { transition: opacity 0.5s ease; }
    .fade-enter-from, .fade-leave-to { opacity: 0; }
    [v-cloak] { display: none !important; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-50 flex justify-center">
  <div id="app" v-cloak class="w-full max-w-md min-h-screen flex flex-col items-center relative overflow-y-auto no-scrollbar shadow-2xl transition-all duration-500" 
       :style="{ backgroundColor: profile['背景主題顏色'] || '#ffffff' }">
    
    <div v-if="isLoading" class="flex flex-col items-center justify-center mt-32 z-50 absolute inset-0 bg-white/80 backdrop-blur-sm">
      <i class="ph ph-spinner animate-spin text-5xl text-pink-500 mb-4"></i>
      <p class="text-gray-500 font-bold" v-text="'資料準備中...'"></p>
    </div>

    <div v-else-if="errorMessage" class="flex flex-col items-center justify-center mt-32 bg-white p-6 rounded-2xl shadow-lg z-50">
      <i class="ph-fill ph-warning-circle text-4xl text-red-500 mb-2"></i>
      <p class="text-gray-800 font-bold" v-text="errorMessage"></p>
    </div>

    <transition name="fade">
      <div v-if="!isLoading && !errorMessage && isAutoShare" class="w-full h-screen flex flex-col items-center justify-center text-center absolute z-50 bg-white/90 backdrop-blur-md">
        <div class="w-20 h-20 bg-white rounded-full shadow-lg flex items-center justify-center mb-6">
           <i class="ph-fill ph-paper-plane-tilt text-4xl text-[#06C755] animate-pulse"></i>
        </div>
        <h2 class="text-xl font-black text-gray-900 mb-2" v-text="'正在開啟好友列表'"></h2>
        <p class="text-sm text-gray-500 font-bold mb-8" v-text="'請在彈出的視窗中選擇要發送的對象'"></p>
        <button @click="closeLiff" class="text-gray-400 text-sm font-bold underline" v-text="'取消並關閉視窗'"></button>
      </div>
    </transition>

    <transition name="fade">
      <div v-if="!isLoading && !errorMessage && !isAutoShare" class="w-full flex flex-col items-center pb-12 relative">
        
        <div v-if="profile['背景圖片URL']" class="relative w-full aspect-[4/5] shrink-0 bg-cover bg-center flex flex-col justify-end items-center pb-[2px]" :style="{ backgroundImage: `url(${profile['背景圖片URL']})` }">
            <div class="absolute bottom-0 left-0 w-full h-1/2" :style="{ background: `linear-gradient(to top, ${profile['背景主題顏色'] || '#ffffff'} 0%, transparent 100%)` }"></div>
            <div class="relative z-10 mb-3">
                <img :src="profile['大頭貼圖片URL'] || 'https://via.placeholder.com/150'" class="w-[110px] h-[110px] rounded-full object-cover border-2 border-white/50 shadow-md bg-gray-100">
            </div>
        </div>

        <div v-else class="relative z-10 w-full flex flex-col items-center mt-[80px] shrink-0">
            <div class="relative mb-3">
                <img :src="profile['大頭貼圖片URL'] || 'https://via.placeholder.com/150'" class="w-[110px] h-[110px] rounded-full object-cover border-2 border-white/50 shadow-md bg-gray-100">
            </div>
        </div>

        <div class="relative z-10 w-full flex flex-col items-center px-6">
            <div class="text-2xl font-black text-center mb-1 tracking-wider" :style="{ color: profile['全域文字顏色'] || '#1a1a1a' }">{{ profile['顯示名稱'] }}</div>
            <div class="text-[13px] text-center whitespace-pre-wrap leading-relaxed w-full break-words opacity-90 mb-5" :style="{ color: profile['全域文字顏色'] || '#1a1a1a' }">{{ profile['個人簡介文字'] }}</div>

            <button @click="shareMyCard" class="w-full bg-[#06C755] hover:bg-[#05b34c] text-white font-bold py-4 rounded-2xl mb-5 shadow-md transition flex items-center justify-center gap-2 transform hover:-translate-y-0.5">
              <i class="ph-fill ph-chat-circle-text text-xl"></i> <span v-text="shareButtonText"></span>
            </button>

            <div v-if="profile['FB連結'] || profile['IG連結'] || profile['LINE連結'] || profile['TikTok連結'] || profile['WeChat連結']" class="flex gap-4 mb-4 justify-center items-center">
                <a v-if="profile['FB連結']" :href="profile['FB連結']" target="_blank" class="hover:opacity-80 transition flex items-center justify-center" :style="{ color: profile['社群Icon顏色'] || '#000000' }"><i class="ph-fill ph-facebook-logo text-[28px]"></i></a>
                <a v-if="profile['IG連結']" :href="profile['IG連結']" target="_blank" class="hover:opacity-80 transition flex items-center justify-center" :style="{ color: profile['社群Icon顏色'] || '#000000' }"><i class="ph-fill ph-instagram-logo text-[28px]"></i></a>
                <a v-if="profile['LINE連結']" :href="profile['LINE連結']" target="_blank" class="hover:opacity-80 transition flex items-center justify-center" :style="{ color: profile['社群Icon顏色'] || '#000000' }">
                    <svg viewBox="0 0 24 24" fill="currentColor" class="w-[28px] h-[28px]" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M24 12c0 6.627-5.373 12-12 12S0 18.627 0 12 5.373 0 12 0s12 5.373 12 12zm-12-7.5c-4.606 0-8.25 3.03-8.25 6.75 0 3.35 2.5 6.17 6.13 6.68.25.05.58.15.65.37.06.2.04.5.02.7l-.1.65c-.03.2-.15.75.65.4 1-.45 5.5-2.3 7.4-4.25 1.25-1.25 1.75-2.7 1.75-4.3C20.25 7.53 16.606 4.5 12 4.5z" /></svg>
                </a>
                <a v-if="profile['WeChat連結']" :href="profile['WeChat連結']" target="_blank" class="hover:opacity-80 transition flex items-center justify-center" :style="{ color: profile['社群Icon顏色'] || '#000000' }"><i class="ph-fill ph-wechat-logo text-[28px]"></i></a>
                <a v-if="profile['TikTok連結']" :href="profile['TikTok連結']" target="_blank" class="hover:opacity-80 transition flex items-center justify-center" :style="{ color: profile['社群Icon顏色'] || '#000000' }"><i class="ph-fill ph-tiktok-logo text-[28px]"></i></a>
            </div>

            <div v-if="profile['YouTube影音連結'] && getYoutubeEmbedUrl(profile['YouTube影音連結'])" class="w-full mt-2 mb-4 rounded-xl overflow-hidden shadow-lg aspect-video bg-black shrink-0 border border-white/20">
                <iframe :src="`https://www.youtube.com/embed/${getYoutubeEmbedUrl(profile['YouTube影音連結'])}`" class="w-full h-full" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>

            <div class="w-full space-y-3 pb-6">
              <a v-for="(btn, index) in buttons" :key="index" :href="buildFinalLink(btn.type || 'url', btn['跳轉連結'] || btn.url)" target="_blank" 
                 @click="trackClickAsync(btn, index)"
                 class="w-full flex items-center justify-center font-bold px-4 py-[14px] transition cursor-pointer relative overflow-hidden group shadow-sm rounded-[2px] transform hover:-translate-y-0.5 hover:shadow-md"
                 :style="{ backgroundColor: btn['按鈕顏色'] || '#ffffff', color: btn['按鈕文字顏色'] || '#000000' }">
                <div class="absolute inset-0 bg-white/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <span class="tracking-widest text-[13px]" v-text="btn['按鈕文字']"></span>
              </a>
            </div>
            
            <p class="mt-4 pb-8 text-xs font-bold text-gray-400 opacity-70">Powered by Ruby.Brand.Design</p>
        </div>
      </div>
    </transition>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue;

    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzvRtYWqMtRbl1p2qzvfnhz-es1X9TqvHHt2tqz4ZR2FDhstbmG8SjYEO8I-25JQal03g/exec";
    const LIFF_ID = "2009561347-VUhbtrEC";

    createApp({
      setup() {
        const profile = ref({});
        const buttons = ref([]);
        const flexMsg = ref(null);
        
        const isLoading = ref(true);
        const errorMessage = ref('');
        const isAutoShare = ref(false); 
        
        const shareButtonText = ref("傳送E-LINE-CARD");

        const getYoutubeEmbedUrl = (url) => {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        };

        const buildFinalLink = (type, value) => {
            if (!value) return '#';
            if (type === 'tel') return value.startsWith('tel:') ? value : 'tel:' + value;
            if (type === 'email') return value.startsWith('mailto:') ? value : 'mailto:' + value;
            if (type === 'share' || String(value).includes('social-plugins.line.me') || String(value).includes('line.me/R/msg')) {
                // 如果是分享類型，一律導入 LINE 官方的 social plugin
                let shareText = '';
                if (String(value).includes('text=')) shareText = decodeURIComponent(value.split('text=')[1]);
                else shareText = `哈囉！這是「${profile.value['顯示名稱']}」的電子名片，請點擊連結查看：\nhttps://liff.line.me/${LIFF_ID}?id=${profile.value['會員ID']}`;
                return `https://social-plugins.line.me/lineit/share?text=${encodeURIComponent(shareText)}`;
            }
            if (type === 'line') {
                if (value.startsWith('http')) return value;
                return 'https://line.me/ti/p/~' + value.replace('@', '%40'); 
            }
            if (!value.startsWith('http') && !value.startsWith('mailto:') && !value.startsWith('tel:')) return 'https://' + value;
            return value;
        };

        const closeLiff = () => {
            if (typeof liff !== 'undefined' && liff.isInClient()) {
                liff.closeWindow();
            } else {
                window.close(); 
            }
        };

        const trackClickAsync = (btn, index) => {
            const targetUrl = btn['跳轉連結'] || btn.url;
            const itemId = btn['按鈕ID'] || btn[Object.keys(btn)[0]]; 
            const btnText = btn['按鈕文字'] || '未知按鈕';
            const urlParams = new URLSearchParams(window.location.search);
            const memberId = urlParams.get('id');
            
            if (!memberId || !targetUrl) return;

            const trackUrl = `${GAS_API_URL}?action=trackClick&memberId=${memberId}&type=button&itemId=${itemId}&btnIdx=${index + 1}&btnText=${encodeURIComponent(btnText)}&url=${encodeURIComponent(targetUrl)}`;
            fetch(trackUrl, { mode: 'no-cors' }).catch(e => console.log('背景追蹤發送失敗', e));
        };

        // 🔥 客製化文案與無縫跨平台分享引擎
        const shareMyCard = async () => {
          try {
            const shareText = `哈囉！這是「${profile.value['顯示名稱'] || '我'}」的電子名片，請點擊連結查看：\nhttps://liff.line.me/${LIFF_ID}?id=${profile.value['會員ID']}`;

            if (typeof liff !== 'undefined' && liff.isInClient()) {
                if (!liff.isLoggedIn()) {
                  liff.login({ redirectUri: window.location.href });
                  return; 
                }

                if (!flexMsg.value) {
                  alert("名片資料尚未準備好，請稍候再試。");
                  if(isAutoShare.value) closeLiff();
                  return;
                }

                if (liff.isApiAvailable('shareTargetPicker')) {
                  const res = await liff.shareTargetPicker([{
                    "type": "flex",
                    "altText": `這是 ${profile.value['顯示名稱']} 的電子名片，請查收！`, 
                    "contents": flexMsg.value
                  }]);
                  
                  if (res) {
                    if (isAutoShare.value) closeLiff();
                    else alert("✨ 名片已成功發送到聊天室！");
                  } else {
                    if (isAutoShare.value) closeLiff();
                  }
                } else {
                  alert("目前無法使用分享功能。請確認 LINE Developers 權限。");
                }

            } else {
                // 若在電腦瀏覽器或非 LINE App 內，喚醒官方社交外掛，讓電腦也能無縫選取好友轉發！
                try {
                    await navigator.clipboard.writeText(shareText);
                    if (!isAutoShare.value) alert('✨ 已為您複製名片資訊！即將喚醒 LINE 準備分享...');
                } catch(err) {
                    console.log('剪貼簿無權限寫入，跳過複製步驟');
                }
                
                window.open(`https://social-plugins.line.me/lineit/share?text=${encodeURIComponent(shareText)}`, '_blank');
                
                if (isAutoShare.value) setTimeout(() => { closeLiff(); }, 1500);
            }
          } catch (err) {
            console.error("分享失敗，原因:", err);
            if (isAutoShare.value) closeLiff();
          }
        };

        onMounted(async () => {
          try {
            await liff.init({ liffId: LIFF_ID });
          } catch (err) {
            console.error("LIFF 初始化失敗", err);
          }

          const urlParams = new URLSearchParams(window.location.search);
          const memberId = urlParams.get('id');
          
          isAutoShare.value = urlParams.get('autoShare') === 'true';

          if (!memberId) {
            errorMessage.value = '網址錯誤：缺少專屬會員 ID';
            isLoading.value = false;
            return;
          }

          try {
            const response = await fetch(`${GAS_API_URL}?id=${memberId}`);
            const data = await response.json();

            if (data.status === 'success') {
              profile.value = data.profile;
              // 將會員 ID 掛載到 profile 方便後續使用
              profile.value['會員ID'] = memberId;
              buttons.value = data.buttons;
              flexMsg.value = data.flexMsg;
              document.title = isAutoShare.value ? '發送名片中...' : `${data.profile['顯示名稱']} 的電子名片`;

              if (isAutoShare.value) {
                  setTimeout(() => { shareMyCard(); }, 500); 
              }
            } else {
              errorMessage.value = data.message || '無法載入名片資料';
            }
          } catch (error) {
            errorMessage.value = '網路連線異常，請稍後再試。';
          } finally {
            isLoading.value = false;
          }
        });

        return { profile, buttons, isLoading, errorMessage, isAutoShare, shareButtonText, shareMyCard, closeLiff, trackClickAsync, getYoutubeEmbedUrl, buildFinalLink };
      }
    }).mount('#app');
  </script>
</body>
</html>
