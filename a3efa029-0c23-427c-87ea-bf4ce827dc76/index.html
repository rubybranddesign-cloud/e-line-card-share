                          setTimeout(async () => {
                              try {
                                  const res = await liff.shareTargetPicker([messageToSend]);
                                  if (res) liff.closeWindow();
                                  else isAutoShare.value = false;
                              } catch (error) {
                                  errorMessage.value = "名片發送失敗，請確認 LINE App 狀態。";
                                  isAutoShare.value = false;
                              }
                          }, 500);
                      } else {
                          errorMessage.value = "您當前的 LINE 版本不支援分享功能，請更新 App。";
                          isAutoShare.value = false;
                      }
                  }
              } catch (e) { errorMessage.value = "轉發資料載入失敗。"; }
          }
        });
        return { profile, buttons, slides, isLoading, errorMessage, isAutoShare, safeBgColor, closeLiff, trackClickAsync, getVideoData, buildFinalLink, getFontFamily };
      }
    }).mount("#app");
  </script>
</body>
</html>
