            if (type === "tel") return value.startsWith("tel:") ? value : "tel:" + value;
            if (type === "email") return value.startsWith("mailto:") ? value : "mailto:" + value;
            if (type === "share" || String(value).includes("social-plugins.line.me") || String(value).includes("line.me/R/msg") || String(value).includes("liff.line.me")) {
                if (String(value).includes("liff.line.me")) return value;
                let shareText = "";
                if (String(value).includes("text=")) shareText = decodeURIComponent(value.split("text=")[1]);
                else shareText = "哈囉！這是「" + (profile.value['顯示名稱'] || "我") + "」的電子名片，請點擊連結查看：\nhttps://liff.line.me/" + LIFF_ID + "?id=" + profile.value['會員ID'];
                return "https://social-plugins.line.me/lineit/share?text=" + encodeURIComponent(shareText);
            }
            if (type === "line" || type === "line_personal") {
                if (value.startsWith("http")) return value;
                return "https://line.me/ti/p/~" + value.replace("@", "%40");
            }
            if (!value.startsWith("http") && !value.startsWith("mailto:") && !value.startsWith("tel:")) return "https://" + value;
            return value;
        };
        const closeLiff = () => {
            if (typeof liff !== "undefined" && liff.isInClient()) liff.closeWindow();
            else window.close();
        };
        const trackClickAsync = (btn, index, specificType) => {
            let targetUrl = btn['跳轉連結'] || btn.url || btn.linkValue;
            if (btn['按鈕類型'] === 'image' || btn.btnType === 'image') {
                if (btn.images && btn.images[btn.currentImgIdx || 0]) {
                    targetUrl = btn.images[btn.currentImgIdx || 0].linkValue || targetUrl;
                }
            }
            const itemId = btn['按鈕ID'] || btn.id || "未知ID";
            const btnText = btn['按鈕文字'] || btn.title || "未知按鈕";
            const memberId = profile.value['會員ID'];
            if (!memberId || !targetUrl) return;
            const reqType = specificType || "button";
            const trackUrl = GAS_API_URL + "?action=trackClick&memberId=" + memberId + "&type=" + reqType + "&itemId=" + itemId + "&btnIdx=" + (index + 1) + "&btnText=" + encodeURIComponent(btnText) + "&url=" + encodeURIComponent(targetUrl);
            fetch(trackUrl, { mode: "no-cors" }).catch(e => console.log("背景追蹤發送失敗", e));
        };

        onMounted(async () => {
          try { await liff.init({ liffId: LIFF_ID }); } catch (err) { console.error("LIFF 初始化失敗", err); }
          const urlParams = new URLSearchParams(window.location.search);
          isAutoShare.value = urlParams.get("autoShare") === "true";
          let rawColor = profile.value['背景主題顏色'];
          let cleanColor = rawColor ? String(rawColor).trim() : "";
          if (cleanColor !== "") {
              if (!cleanColor.startsWith("#") && (cleanColor.length === 6 || cleanColor.length === 3)) cleanColor = "#" + cleanColor;
              safeBgColor.value = cleanColor;
          }
          document.body.style.backgroundColor = safeBgColor.value;
          
          // ⚡️ 核心修改 2：前端防護改為「背景執行」，不使用 await 阻塞畫面
          fetch(GAS_API_URL + "?action=checkStatus&id=" + profile.value['會員ID'])
            .then(res => res.json())
            .then(checkData => {
              if (checkData.status === 'expired') {
                  errorMessage.value = "此帳號已失效"; // 如果過期，才把錯誤畫面蓋上去
                  isAutoShare.value = false;
              }
            })
            .catch(e => console.error("背景驗證狀態失敗", e));

          // ⚡️ 核心修改 3：如果是自動分享轉發情境，我們才顯示 Loading 遮罩去抓取要轉發的 Flex Message
          if (isAutoShare.value) {
              isLoading.value = true; 
              if (!liff.isLoggedIn()) {
                  liff.login({ redirectUri: window.location.href });
                  return;
              }
              try {
                  const response = await fetch(GAS_API_URL + "?action=getData&id=" + profile.value['會員ID']);
                  const data = await response.json();
                  if (data.status === "expired") {
                      errorMessage.value = "此帳號已失效";
                      isAutoShare.value = false;
                      isLoading.value = false;
                  } else if (data.status === "success" && data.flexMsg) {
                      flexMsg.value = data.flexMsg;
                      if (liff.isApiAvailable("shareTargetPicker")) {
                          const messageToSend = { type: "flex", altText: profile.value['顯示名稱'] + " 的電子名片", contents: flexMsg.value };
                          setTimeout(async () => {
                              try {
                                  isLoading.value = false; // 抓到資料準備彈出選擇器時，關閉 Loading
                                  const res = await liff.shareTargetPicker([messageToSend]);
                                  if (res) liff.closeWindow();
                                  else isAutoShare.value = false;
                              } catch (error) {
                                  errorMessage.value = "名片發送失敗，請確認 LINE App 狀態。";
                                  isAutoShare.value = false;
                                  isLoading.value = false;
                              }
                          }, 500);
                      } else {
                          errorMessage.value = "您當前的 LINE 版本不支援分享功能，請更新 App。";
                          isAutoShare.value = false;
                          isLoading.value = false;
                      }
                  }
              } catch (e) { 
                errorMessage.value = "轉發資料載入失敗。"; 
                isLoading.value = false;
              }
          }
        });
        return { profile, buttons, slides, isLoading, errorMessage, isAutoShare, safeBgColor, closeLiff, trackClickAsync, getVideoData, buildFinalLink, getFontFamily, handleTouchStart, handleTouchEnd, nextImg, prevImg };
      }
    }).mount("#app");
  </script>
</body>
</html>
