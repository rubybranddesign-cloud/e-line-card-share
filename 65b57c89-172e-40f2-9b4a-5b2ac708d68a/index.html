        const rawSlides = [{"id":"sld_mopl6enc_loey21ax","sort":1,"imageUrl":"https://drive.google.com/thumbnail?id=1uH0r219bOU7mmSw2wOR-ic2M_ObeRZGZ&sz=w1000","buttonFont":"預設字體","buttonTextColor":"#ffffff","bgColor":"#ffffff","buttons":[{"text":"Invitation 入席表單","color":"#bc898e","type":"url","url":"https://docs.google.com/forms/d/e/1FAIpQLSejIl5kbAarJ_NaDixx0FVZ46z3s1ce-yrxxtG4SoA2UCqIKA/viewform?pli=1","clicks":0}]},{"id":"sld_mopl6eul_mxme3wyr","sort":2,"imageUrl":"https://drive.google.com/thumbnail?id=1ldyjc64tr3BplrLwY5zLMSjcmpHmwbxO&sz=w1000","buttonFont":"預設字體","buttonTextColor":"#ffffff","bgColor":"#ffffff","buttons":[{"text":"聯絡我們","color":"#bc898e","type":"line","url":"https://line.me/ti/p/~%40775vyref","clicks":0}]},{"id":"sld_mopl6fbv_xrpqofe9","sort":3,"imageUrl":"https://drive.google.com/thumbnail?id=1FQZEK17XK4s6831jXDHxLGVYn4NF6iEh&sz=w1000","buttonFont":"預設字體","buttonTextColor":"#ffffff","bgColor":"#ffffff","buttons":[{"text":"我們的婚紗照","color":"#6C0B22","type":"url","url":"https://www.instagram.com/c.0122.l?igsh=MW42cTM0cGNranBycg==","clicks":0}]},{"id":"sld_mopl6fjz_46co0dhj","sort":4,"imageUrl":"https://drive.google.com/thumbnail?id=1K-WK4vhqCj4tC2NdkutjSxOstN1Ypbna&sz=w1000","buttonFont":"預設字體","buttonTextColor":"#ffffff","bgColor":"#ffffff","buttons":[{"text":"金典酒店13樓","color":"#6C0B22","type":"url","url":"https://maps.app.goo.gl/GowwkZCMKDsk78Rz9?g_st=il","clicks":0}]},{"id":"sld_mopl9xm7_qoke4kps","sort":5,"imageUrl":"https://drive.google.com/thumbnail?id=1-Jkm1lF3MN4HwTHOaxgBEtE6emRMhhXq&sz=w1000","buttonFont":"預設字體","buttonTextColor":"#ffffff","bgColor":"#ffffff","buttons":[{"text":"上傳照片/影片雲端","color":"#9a8879","type":"url","url":"https://docs.google.com/forms/d/e/1FAIpQLSejIl5kbAarJ_NaDixx0FVZ46z3s1ce-yrxxtG4SoA2UCqIKA/viewform?pli=1","clicks":0}]}];
        const processedSlides = rawSlides.map(s => {
          const slideBtns = (s.buttons || []).map(b => ({
            title: b.text || b.title || '',
            linkValue: b.url || b.linkValue || '',
            type: b.type || 'url',
            color: b.color || '#6C0B22'
          }));
          return {
            id: s.id || s['輪播ID'],
            imageUrl: s.imageUrl || s['主圖片URL'],
            bgColor: s.bgColor || '#ffffff',
            buttonTextColor: s.buttonTextColor || '#ffffff',
            buttonFont: s.buttonFont || '預設字體',
            buttons: slideBtns
          };
        });
        const slides = ref(processedSlides);
        // ----------------------------------------------

        const flexMsg = ref(null);
        const isLoading = ref(true);
        const errorMessage = ref("");
        const isAutoShare = ref(false);
        const safeBgColor = ref("#fefce8");

        const getVideoData = (url) => {
            if (!url) return null;
            const ytMatch = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
            if (ytMatch && ytMatch[2].length === 11) return { type: "youtube", embedUrl: "https://www.youtube.com/embed/" + ytMatch[2] };
            const vimeoMatch = url.match(/(?:vimeo\.com\/|player\.vimeo\.com\/video\/)([0-9]+)/);
            if (vimeoMatch && vimeoMatch[1]) return { type: "vimeo", embedUrl: "https://player.vimeo.com/video/" + vimeoMatch[1] + "?title=0&byline=0&portrait=0" };
            const driveMatch = url.match(/drive\.google\.com\/(?:file\/d\/|open\?id=)([a-zA-Z0-9_-]+)/);
            if (driveMatch && driveMatch[1]) return { type: "html5", embedUrl: "https://drive.google.com/uc?export=download&id=" + driveMatch[1] };
            if (url.match(/\.(mp4|webm|ogg)$/i)) return { type: "html5", embedUrl: url };
            return null;
        };
        const getFontFamily = (fontName) => {
            const map = { "預設字體": "sans-serif", "黑體": "\"Noto Sans TC\", sans-serif", "明體": "\"Noto Serif TC\", serif", "圓體": "\"Zen Maru Gothic\", sans-serif" };
            return map[fontName] || "sans-serif";
        };
        const buildFinalLink = (type, value) => {
            if (!value) return "#";
            if (type === "tel") return value.startsWith("tel:") ? value : "tel:" + value;
            if (type === "email") return value.startsWith("mailto:") ? value : "mailto:" + value;
            if (type === "share" || String(value).includes("social-plugins.line.me") || String(value).includes("line.me/R/msg") || String(value).includes("liff.line.me")) {
                if (String(value).includes("liff.line.me")) return value;
                let shareText = "";
                if (String(value).includes("text=")) shareText = decodeURIComponent(value.split("text=")[1]);
                else shareText = "哈囉！這是「" + (profile.value['顯示名稱'] || "我") + "」的電子名片，請點擊連結查看：\nhttps://liff.line.me/" + LIFF_ID + "?id=" + profile.value['會員ID'];
                return "https://social-plugins.line.me/lineit/share?text=" + encodeURIComponent(shareText);
            }
            if (type === "line" || type === "line_personal") {
                if (value.startsWith("http")) return value;
                return "https://line.me/ti/p/~" + value.replace("@", "%40");
            }
            if (!value.startsWith("http") && !value.startsWith("mailto:") && !value.startsWith("tel:")) return "https://" + value;
            return value;
        };
        const closeLiff = () => {
            if (typeof liff !== "undefined" && liff.isInClient()) liff.closeWindow();
            else window.close();
        };
        const trackClickAsync = (btn, index, specificType) => {
            const targetUrl = btn['跳轉連結'] || btn.url || btn.linkValue;
            const itemId = btn['按鈕ID'] || btn.id || "未知ID";
            const btnText = btn['按鈕文字'] || btn.title || "未知按鈕";
            const memberId = profile.value['會員ID'];
            if (!memberId || !targetUrl) return;
            const reqType = specificType || "button";
            const trackUrl = GAS_API_URL + "?action=trackClick&memberId=" + memberId + "&type=" + reqType + "&itemId=" + itemId + "&btnIdx=" + (index + 1) + "&btnText=" + encodeURIComponent(btnText) + "&url=" + encodeURIComponent(targetUrl);
            fetch(trackUrl, { mode: "no-cors" }).catch(e => console.log("背景追蹤發送失敗", e));
        };
        onMounted(async () => {
          try { await liff.init({ liffId: LIFF_ID }); } catch (err) { console.error("LIFF 初始化失敗", err); }
          const urlParams = new URLSearchParams(window.location.search);
          isAutoShare.value = urlParams.get("autoShare") === "true";
          let rawColor = profile.value['背景主題顏色'];
          let cleanColor = rawColor ? String(rawColor).trim() : "";
          if (cleanColor !== "") {
              if (!cleanColor.startsWith("#") && (cleanColor.length === 6 || cleanColor.length === 3)) cleanColor = "#" + cleanColor;
              safeBgColor.value = cleanColor;
          }
          document.body.style.backgroundColor = safeBgColor.value;
          isLoading.value = false;
          if (isAutoShare.value) {
              if (!liff.isLoggedIn()) {
                  liff.login({ redirectUri: window.location.href });
                  return;
              }
              try {
                  const response = await fetch(GAS_API_URL + "?action=getData&id=" + profile.value['會員ID']);
                  const data = await response.json();
                  if (data.status === "success" && data.flexMsg) {
                      flexMsg.value = data.flexMsg;
                      if (liff.isApiAvailable("shareTargetPicker")) {
                          const messageToSend = { type: "flex", altText: profile.value['顯示名稱'] + " 的電子名片", contents: flexMsg.value };
                          setTimeout(async () => {
                              try {
                                  const res = await liff.shareTargetPicker([messageToSend]);
                                  if (res) liff.closeWindow();
                                  else isAutoShare.value = false;
                              } catch (error) {
                                  errorMessage.value = "名片發送失敗，請確認 LINE App 狀態。";
                                  isAutoShare.value = false;
                              }
                          }, 500);
                      } else {
                          errorMessage.value = "您當前的 LINE 版本不支援分享功能，請更新 App。";
                          isAutoShare.value = false;
                      }
                  }
              } catch (e) { errorMessage.value = "轉發資料載入失敗。"; }
          }
        });
        return { profile, buttons, slides, isLoading, errorMessage, isAutoShare, safeBgColor, closeLiff, trackClickAsync, getVideoData, buildFinalLink, getFontFamily };
      }
    }).mount("#app");
  </script>
